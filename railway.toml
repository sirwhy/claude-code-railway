[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m src.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.healthcheck]
# If ENABLE_API_SERVER=true, Railway can health-check the FastAPI endpoint.
# Leave disabled for pure polling mode.
# httpPath = "/health"
# intervalSeconds = 30
# timeoutSeconds = 10
